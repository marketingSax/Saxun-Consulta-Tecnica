[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[edge_functions]]
  function = "gemini-stream"
  path = "/.netlify/edge-functions/gemini-stream"

# Excluir rutas /.netlify/ del redirect SPA (DEBE ir ANTES del catch-all)
[[redirects]]
  from = "/.netlify/*"
  to = "/.netlify/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
