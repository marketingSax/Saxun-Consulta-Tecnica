<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Asistente técnico inteligente de Saxun para la consulta de catálogos y dossiers de celosías.">
    <title>Consulta Técnica Celosías - Saxun</title>
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#E30613">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Saxun">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <!-- Marked.js para renderizar Markdown -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* CSS reset & variables */
        :root {
            --red-saxun: #E30613;
            --red-light: #FEF2F2;
            --red-border: #FECACA;
            --red-mid: rgba(227, 6, 19, 0.08);
            --bg-main: #F2F2F0;
            --sidebar-bg: #FAFAF8;
            --text-dark: #1A1A1A;
            --text-light: #6B7280;
            --bubble-user: #E30613;
            --bubble-ai: #E0E0E0;
            --font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            font-weight: 500;
            background-color: var(--bg-main);
            color: var(--text-dark);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            inset: 0;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        #loading-screen.hidden {
            display: none;
        }

        .loading-logo {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
            color: white;
            letter-spacing: -0.5px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .loading-logo span {
            color: var(--red-saxun);
            font-weight: 300;
        }

        .loading-logo img {
            height: 56px;
            width: auto;
            margin-bottom: 0;
            filter: invert(1) brightness(2);
        }

        .progress-container {
            width: min(320px, 85vw);
            height: 6px;
            background-color: #333;
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--red-saxun);
            width: 0%;
            transition: width 0.4s ease-out;
            box-shadow: 0 0 10px rgba(227, 6, 19, 0.5);
        }

        .loading-text {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            text-align: center;
            font-weight: 500;
        }

        .loading-subtext {
            font-size: 0.85rem;
            color: #888;
            text-align: center;
            max-width: 400px;
        }

        .retry-btn {
            display: none;
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            background-color: var(--red-saxun);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background-color 0.2s;
        }

        .retry-btn:hover {
            background-color: #C00510;
        }

        /* Main App Layout */
        #app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        #app-container.hidden {
            display: none;
        }

        /* Header */
        header {
            background-color: #FFFFFF;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2.5px solid var(--red-saxun);
            z-index: 10;
            flex-shrink: 0;
            height: 65px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-dark);
            padding: 0.25rem;
            align-items: center;
        }

        .app-title {
            font-weight: 800;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            letter-spacing: -0.2px;
            height: 100%;
        }

        .app-title span {
            color: var(--red-saxun);
            font-weight: 800;
            font-size: 0.95rem;
            border-left: 2px solid var(--red-saxun);
            padding-left: 0.75rem;
            letter-spacing: 0.01em;
        }

        .app-logo {
            height: 52px;
            width: auto;
            display: block;
            object-fit: contain;
            transition: all 0.3s ease;
        }

        .loading-logo img {
            height: 50px;
            width: auto;
            object-fit: contain;
            filter: invert(1) brightness(2);
        }

        .badge {
            background-color: #10B981;
            color: white;
            padding: 0.35rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        /* Main Content area */
        .content-area {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Sidebar */
        aside {
            width: min(380px, 30vw);
            background-color: var(--sidebar-bg);
            border-right: 1px solid #E2E2DF;
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1rem;
            overflow-y: auto;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 20;
        }

        .sidebar-section {
            margin-bottom: 1.5rem;
        }

        .sidebar-title {
            font-size: 0.68rem;
            text-transform: uppercase;
            color: var(--red-saxun);
            font-weight: 700;
            margin-bottom: 0.85rem;
            letter-spacing: 0.1em;
        }

        .doc-btn {
            display: flex;
            align-items: center;
            width: 100%;
            text-align: left;
            padding: 0.7rem 0.85rem;
            background-color: #FFFFFF;
            border: 1px solid #E2E2DF;
            border-left: 3px solid var(--red-saxun);
            border-radius: 6px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-dark);
            transition: all 0.2s ease;
            font-weight: 600;
            font-family: var(--font-family);
            gap: 0.5rem;
        }

        .doc-btn:hover {
            background-color: var(--red-light);
            border-left-color: var(--red-saxun);
            color: var(--red-saxun);
        }

        .doc-btn i {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
        }

        .doc-btn span {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            flex: 1;
        }

        .sugg-item {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 0.5rem;
        }

        .sugg-btn {
            display: flex;
            align-items: center;
            flex: 1;
            text-align: left;
            padding: 0.65rem 0.8rem;
            background-color: #FFFFFF;
            border: 1px solid #E2E2DF;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-dark);
            transition: all 0.2s ease;
            font-weight: 600;
            font-family: var(--font-family);
            gap: 0.5rem;
            overflow: hidden;
        }

        .sugg-btn:hover {
            background-color: var(--red-light);
            border-color: var(--red-border);
            color: var(--red-saxun);
        }

        .sugg-btn i {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
            color: var(--red-saxun);
        }

        .sugg-btn .query-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .delete-query-btn {
            background: none;
            border: none;
            padding: 5px;
            cursor: pointer;
            color: #C0C0C0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.15s, color 0.15s, background 0.15s;
        }

        .delete-query-btn i {
            width: 13px;
            height: 13px;
        }

        .sugg-item:hover .delete-query-btn {
            opacity: 1;
        }

        .delete-query-btn:hover {
            color: var(--red-saxun);
            background-color: #FEE2E2;
        }

        .sidebar-title-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .sidebar-title-wrapper .sidebar-title {
            margin-bottom: 0;
        }

        .add-query-btn {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .add-query-btn:hover {
            background-color: #E5E7EB;
            color: var(--text-dark);
        }

        .badge-new {
            background-color: var(--red-saxun);
            color: white;
            font-size: 0.65rem;
            padding: 0.15rem 0.4rem;
            border-radius: 9999px;
            font-weight: bold;
            letter-spacing: 0.05em;
        }

        hr {
            border: none;
            border-top: 1px solid #E5E7EB;
            margin: 1.5rem 0;
        }

        /* Chat Area */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-main);
            position: relative;
        }

        .chat-history {
            background-image: radial-gradient(circle, #D8D8D4 1.25px, transparent 1.25px);
            background-size: 30px 30px;
        }

        .chat-history {
            flex: 1;
            padding: 1.5rem 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .chat-history>* {
            width: 100%;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .message {
            max-width: 85%;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
        }

        .message.ai {
            align-self: flex-start;
        }

        .bubble {
            padding: 1.25rem 1.5rem;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .user .bubble {
            background-color: var(--bubble-user);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 10px rgba(227, 6, 19, 0.15);
        }

        .ai .bubble {
            background-color: #FFFFFF;
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #E2E2DF;
        }

        /* Markdown styling inside AI bubble */
        .ai .bubble h1,
        .ai .bubble h2,
        .ai .bubble h3 {
            margin-top: 1.25rem;
            margin-bottom: 0.75rem;
            color: var(--text-dark);
            font-weight: 700;
        }

        .ai .bubble h1:first-child,
        .ai .bubble h2:first-child,
        .ai .bubble h3:first-child {
            margin-top: 0;
        }

        .ai .bubble p {
            margin-bottom: 1rem;
        }

        .ai .bubble p:last-child {
            margin-bottom: 0;
        }

        .ai .bubble ul,
        .ai .bubble ol {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .ai .bubble li {
            margin-bottom: 0.25rem;
        }

        .ai .bubble table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: block;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }

        .ai .bubble th,
        .ai .bubble td {
            border: 1px solid #E0E0E0;
            padding: 0.75rem;
            text-align: left;
        }

        .ai .bubble th {
            background-color: #F9FAFB;
            font-weight: 600;
        }

        .ai .bubble strong {
            font-weight: 700;
        }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background-color: var(--sidebar-bg);
            padding: 1.25rem 1.5rem;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            border: 1px solid #EAEAEA;
            margin-bottom: 1.5rem;
        }

        .dots {
            display: flex;
            gap: 6px;
            align-items: center;
            height: 20px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #B0B0B0;
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes blink {

            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.4;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .bubble.loading {
            display: flex;
            align-items: center;
            gap: 4px;
            min-width: 50px;
            min-height: 30px;
        }

        .bubble.loading .dot {
            width: 6px;
            height: 6px;
            background-color: #B0B0B0;
            border-radius: 50%;
            animation: bubbleDot 1.4s infinite ease-in-out both;
            margin: 0;
        }

        .bubble.loading .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .bubble.loading .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bubbleDot {

            0%,
            80%,
            100% {
                transform: scale(0);
                opacity: 0.3;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #D1D5DB;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #9CA3AF;
        }

        /* Input Area */
        .input-area {
            padding: 1rem;
            background: rgba(242, 242, 240, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(226, 226, 223, 0.8);
            z-index: 5;
            display: flex;
            justify-content: center;
        }

        .input-area .input-container {
            width: 100%;
            max-width: 900px;
        }

        .input-container {
            display: flex;
            gap: 0.75rem;
            background-color: white;
            padding: 0.6rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            border: 1px solid #E2E2DF;
            align-items: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-container:focus-within {
            border-color: #D1D5DB;
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.08);
        }

        .chat-input {
            flex: 1;
            border: none;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
            resize: none;
            background: transparent;
            color: var(--text-dark);
        }

        .chat-input::placeholder {
            color: #9CA3AF;
        }

        .send-btn {
            background-color: var(--red-saxun);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 1.5rem;
            height: 44px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover:not(:disabled) {
            background-color: #C00510;
            transform: translateY(-1px);
        }

        .send-btn:disabled {
            background-color: #D1D5DB;
            cursor: not-allowed;
            transform: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 0.75rem 1rem;
            }

            .hamburger {
                display: flex;
                margin-right: 0.5rem;
            }

            .app-title span {
                display: none;
            }

            aside {
                position: fixed;
                top: 0;
                bottom: 0;
                left: 0;
                width: 280px;
                height: 100dvh;
                transform: translateX(-100%);
                box-shadow: 10px 0 30px rgba(0, 0, 0, 0.15);
                border-right: none;
            }

            aside.open {
                transform: translateX(0);
            }

            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 15;
                backdrop-filter: blur(4px);
                -webkit-backdrop-filter: blur(4px);
                animation: fadeInOverlay 0.3s ease;
            }

            @keyframes fadeInOverlay {
                from {
                    opacity: 0;
                }

                to {
                    opacity: 1;
                }
            }

            .sidebar-overlay.open {
                display: block;
            }

            .chat-history {
                padding: 1rem 0.75rem;
            }

            .message {
                max-width: 95%;
            }

            .bubble {
                padding: 0.85rem 1rem;
                font-size: 0.92rem;
            }

            .input-area {
                padding: 0.75rem;
                padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
            }

            .input-container {
                padding: 0.35rem;
                border-radius: 14px;
            }

            .chat-input {
                padding: 0.5rem 0.75rem;
                font-size: 16px;
                /* Evita zoom automático en iOS */
            }

            .send-btn {
                padding: 0 1rem;
                height: 38px;
                border-radius: 10px;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            aside {
                width: 300px;
            }

            .chat-history {
                padding: 1.5rem;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            header {
                padding: 0.4rem 1rem;
            }

            .app-logo {
                height: 35px;
            }

            .sidebar-section {
                margin-bottom: 1rem;
            }

            .chat-history {
                gap: 1rem;
            }
        }
    </style>
</head>

<body>

    <!-- Pantalla de Carga -->
    <div id="loading-screen">
        <div class="loading-logo">
            <img src="logo.png" alt="Saxun">
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="loading-text" id="loading-text">Preparando base de conocimiento...</div>
        <div class="loading-subtext">Solo ocurre la primera vez. Las siguientes cargas serán instantáneas.</div>
        <button class="retry-btn" id="retry-btn" onclick="iniciarApp()">Reintentar</button>
    </div>

    <!-- Aplicación Principal -->
    <div id="app-container" class="hidden">
        <header>
            <div class="header-left">
                <button class="hamburger" id="hamburger-btn" aria-label="Abrir menú">
                    <i data-lucide="menu"></i>
                </button>
                <div class="app-title">
                    <img src="logo.png" alt="Saxun" class="app-logo">
                    <span>Consulta Técnica Celosías</span>
                </div>
            </div>
        </header>

        <div class="content-area">
            <div class="sidebar-overlay" id="sidebar-overlay"></div>
            <aside id="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-title">Accesos Rápidos</div>
                    <button class="doc-btn" onclick="insertarTexto('Basándote en el Catálogo 2026, ')">
                        <span><i data-lucide="book-open"></i> Catálogo 2026</span>
                        <span class="badge-new">NUEVO</span>
                    </button>
                    <button class="doc-btn" onclick="insertarTexto('Basándote en el Dossier Técnico, ')">
                        <span><i data-lucide="settings"></i> Dossier Técnico</span>
                    </button>
                </div>

                <hr>

                <div class="sidebar-section">
                    <div class="sidebar-title-wrapper">
                        <div class="sidebar-title">Consultas Rápidas</div>
                        <button class="add-query-btn" onclick="añadirConsulta()" title="Añadir consulta">
                            <i data-lucide="plus"></i>
                        </button>
                    </div>
                    <div id="consultas-container">
                        <div class="sugg-item">
                            <button class="sugg-btn" onclick="enviarConsultaRápida('¿Qué lamas móviles existen?')">
                                <i data-lucide="chevron-right"></i>
                                <span class="query-text">¿Qué lamas móviles existen?</span>
                            </button>
                            <button class="delete-query-btn" onclick="eliminarConsulta(this)" title="Eliminar">
                                <i data-lucide="x"></i>
                            </button>
                        </div>
                        <div class="sugg-item">
                            <button class="sugg-btn" onclick="enviarConsultaRápida('Dimensiones de la lama O-300')">
                                <i data-lucide="chevron-right"></i>
                                <span class="query-text">Dimensiones de la lama O-300</span>
                            </button>
                            <button class="delete-query-btn" onclick="eliminarConsulta(this)" title="Eliminar">
                                <i data-lucide="x"></i>
                            </button>
                        </div>
                        <div class="sugg-item">
                            <button class="sugg-btn"
                                onclick="enviarConsultaRápida('Diferencias entre catálogo 2024 y 2026')">
                                <i data-lucide="chevron-right"></i>
                                <span class="query-text">Diferencias entre catálogos</span>
                            </button>
                            <button class="delete-query-btn" onclick="eliminarConsulta(this)" title="Eliminar">
                                <i data-lucide="x"></i>
                            </button>
                        </div>
                        <div class="sugg-item">
                            <button class="sugg-btn"
                                onclick="enviarConsultaRápida('¿Qué sistemas admiten motorización?')">
                                <i data-lucide="chevron-right"></i>
                                <span class="query-text">¿Qué motorizados hay?</span>
                            </button>
                            <button class="delete-query-btn" onclick="eliminarConsulta(this)" title="Eliminar">
                                <i data-lucide="x"></i>
                            </button>
                        </div>
                        <div class="sugg-item">
                            <button class="sugg-btn" onclick="enviarConsultaRápida('Lamas con iluminación LED')">
                                <i data-lucide="chevron-right"></i>
                                <span class="query-text">Lamas con iluminación LED</span>
                            </button>
                            <button class="delete-query-btn" onclick="eliminarConsulta(this)" title="Eliminar">
                                <i data-lucide="x"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </aside>

            <main>
                <div class="chat-history" id="chat-history">
                    <div class="message ai">
                        <div class="bubble">
                            <p>¡Hola! Soy el asistente técnico de Celosias de Saxun.</p>
                            <p>¿En qué puedo ayudarte hoy?</p>
                        </div>
                    </div>
                    <div class="typing-indicator" id="typing-indicator">
                        <div class="dots">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                    </div>
                </div>

                <div class="input-area">
                    <div class="input-container">
                        <input type="text" id="chat-input" class="chat-input"
                            placeholder="Pregunta sobre cualquier modelo, dimensión, sistema de anclaje..."
                            autocomplete="off">
                        <button id="send-btn" class="send-btn">Enviar</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // URLs de Proxy para Netlify
        const API_URL = "/api/gemini-stream";
        const UPLOAD_URL = "/.netlify/functions/upload-proxy";

        let pdfUris = [];
        let conversationHistory = [];

        // UI Elements
        const loadingScreen = document.getElementById('loading-screen');
        const appContainer = document.getElementById('app-container');
        const progressBar = document.getElementById('progress-bar');
        const loadingText = document.getElementById('loading-text');
        const retryBtn = document.getElementById('retry-btn');
        const chatHistory = document.getElementById('chat-history');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        const hamburgerBtn = document.getElementById('hamburger-btn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        lucide.createIcons();

        // ─── Sidebar ────────────────────────────────────────────
        function toggleSidebar() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('open');
        }

        hamburgerBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);

        // ─── Consultas rápidas ───────────────────────────────────
        function crearBtnConsulta(texto, enviar) {
            const consulta = enviar || texto;
            const item = document.createElement('div');
            item.className = 'sugg-item';
            item.innerHTML = `
                <button class="sugg-btn">
                    <i data-lucide="chevron-right"></i>
                    <span class="query-text">${texto}</span>
                </button>
                <button class="delete-query-btn" title="Eliminar">
                    <i data-lucide="x"></i>
                </button>
            `;
            item.querySelector('.sugg-btn').addEventListener('click', () => enviarConsultaRápida(consulta));
            item.querySelector('.delete-query-btn').addEventListener('click', () => eliminarConsulta(item.querySelector('.delete-query-btn')));
            return item;
        }

        function eliminarConsulta(deleteBtn) {
            const item = deleteBtn.closest('.sugg-item');
            if (item) {
                item.style.transition = 'opacity 0.2s, transform 0.2s';
                item.style.opacity = '0';
                item.style.transform = 'translateX(-10px)';
                setTimeout(() => item.remove(), 220);
            }
        }

        function añadirConsulta() {
            const nuevaConsulta = prompt("Introduce la nueva consulta recurrente:");
            if (nuevaConsulta && nuevaConsulta.trim() !== '') {
                const item = crearBtnConsulta(nuevaConsulta.trim());
                document.getElementById('consultas-container').appendChild(item);
                lucide.createIcons({ root: item });
            }
        }

        // ─── Carga de scripts ────────────────────────────────────
        /**
         * FIX: comprueba si el script ya está en el DOM antes de añadirlo.
         * Evita el error "Identifier already declared" al pulsar Reintentar.
         */
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                if (document.querySelector(`script[src="${src}"]`)) {
                    // Ya cargado, no hace falta repetir
                    return resolve();
                }
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = () => reject(new Error(`Error al cargar: ${src}`));
                document.body.appendChild(script);
            });
        }

        // ─── Inicialización ──────────────────────────────────────
        async function iniciarApp() {
            loadingScreen.classList.remove('hidden');
            appContainer.classList.add('hidden');
            retryBtn.style.display = 'none';
            progressBar.style.width = '0%';
            progressBar.style.backgroundColor = 'var(--red-saxun)';

            try {
                // FASE 1: Cargar datos en orden correcto
                // data_pdf2 y data_pdf3 ANTES que data_index (que los referencia)
                const dataFiles = ['data_pdf2.js', 'data_pdf3.js', 'data_index.js'];
                const totalFiles = dataFiles.length;

                for (let i = 0; i < totalFiles; i++) {
                    loadingText.textContent = `Descargando catálogos técnicos... (${i + 1}/${totalFiles})`;
                    await loadScript(dataFiles[i]);
                    progressBar.style.width = `${Math.round(((i + 1) / totalFiles) * 50)}%`;
                }

                // FASE 2: Conectar con la IA
                loadingText.textContent = "Conectando con el motor de inteligencia técnica...";

                // FASE 3: Subir PDFs a Gemini (con caché de 47h)
                pdfUris = await inicializarPDFs((current, total, name) => {
                    const percent = 50 + Math.round((current / total) * 50);
                    progressBar.style.width = `${percent}%`;
                    loadingText.textContent = `Sincronizando conocimiento: ${name}...`;
                });

                // Éxito
                loadingText.textContent = "¡Todo listo! Iniciando asistente...";
                progressBar.style.width = '100%';

                setTimeout(() => {
                    loadingScreen.classList.add('hidden');
                    appContainer.classList.remove('hidden');
                    chatInput.focus();
                }, 800);

            } catch (error) {
                console.error("Error en la inicialización:", error);
                loadingText.textContent = `Error: ${error.message}`;
                progressBar.style.backgroundColor = '#E30613';
                progressBar.style.width = '100%';
                retryBtn.style.display = 'block';
            }
        }

        // ─── Chat ────────────────────────────────────────────────
        function insertarTexto(texto) {
            chatInput.value = texto;
            chatInput.focus();
            if (window.innerWidth <= 768) toggleSidebar();
        }

        function enviarConsultaRápida(pregunta) {
            chatInput.value = pregunta;
            enviarMensaje();
            if (window.innerWidth <= 768) toggleSidebar();
        }

        function renderMarkdown(text) {
            if (typeof marked !== 'undefined') return marked.parse(text);
            return text.replace(/\n/g, '<br>');
        }

        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;

            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bubble';

            if (role === 'ai') {
                bubbleDiv.innerHTML = renderMarkdown(text);
            } else {
                bubbleDiv.textContent = text;
            }

            msgDiv.appendChild(bubbleDiv);
            chatHistory.insertBefore(msgDiv, typingIndicator);
            scrollToBottom();
            return msgDiv;
        }

        function scrollToBottom() {
            setTimeout(() => { chatHistory.scrollTop = chatHistory.scrollHeight; }, 50);
        }

        async function enviarMensaje() {
            const texto = chatInput.value.trim();
            if (!texto) return;

            chatInput.value = '';
            chatInput.disabled = true;
            sendBtn.disabled = true;

            appendMessage('user', texto);
            typingIndicator.style.display = 'flex';
            scrollToBottom();

            let aiTextAccumulator = "";
            let aiMessageElement = null;

            try {
                // OPTIMIZACIÓN: Solo enviamos los PDFs en el primer mensaje o si detectamos una consulta técnica específica
                const esFirstMessage = conversationHistory.length === 0;
                
                // Usamos la nueva lógica de buildPDFParts que filtra por relevancia
                const userParts = esFirstMessage
                    ? [...buildPDFParts(pdfUris, texto), { text: texto }]
                    : [{ text: texto }];

                conversationHistory.push({ role: "user", parts: userParts });

                // GESTIÓN DE HISTORIAL (Sliding Window): 
                // Si el historial es muy largo (> 10 mensajes), mantenemos los 2 primeros (contexto inicial) 
                // y los 4 últimos para ahorrar tokens sin perder el hilo.
                let filteredHistory = [...conversationHistory];
                if (filteredHistory.length > 10) {
                    filteredHistory = [
                        ...filteredHistory.slice(0, 2),
                        { role: "user", parts: [{ text: "... [Historial resumido para optimizar memoria] ..." }] },
                        ...filteredHistory.slice(-4)
                    ];
                }

                const requestBody = {
                    system_instruction: {
                        parts: [{ text: typeof SYSTEM_PROMPT !== 'undefined' ? SYSTEM_PROMPT : "Eres un asistente técnico experto." }]
                    },
                    contents: filteredHistory,
                    generationConfig: {
                        temperature: 0.2,
                        maxOutputTokens: 2048 // Reducido de 4096 para mayor rapidez y ahorro
                    }
                };

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    const errorBody = await response.text();
                    throw new Error(`Error HTTP ${response.status}: ${errorBody || 'Error desconocido'}`);
                }

                const contentType = response.headers.get('Content-Type');
                if (contentType && contentType.includes('text/html')) {
                    throw new Error("El servidor devolvió HTML. Revisa la configuración de las funciones de Netlify.");
                }

                typingIndicator.style.display = 'none';

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let sseBuffer = '';

                // Burbuja IA vacía con animación de carga
                aiMessageElement = appendMessage('ai', '');
                const bubble = aiMessageElement.querySelector('.bubble');
                bubble.classList.add('loading');
                bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    sseBuffer += decoder.decode(value, { stream: true });
                    const lines = sseBuffer.split('\n');
                    sseBuffer = lines.pop(); // línea incompleta queda en buffer

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));

                                if (data.error) throw new Error(data.error);

                                if (data.candidates?.[0]?.content) {
                                    const partText = data.candidates[0].content.parts[0].text;

                                    if (aiTextAccumulator === "") {
                                        bubble.classList.remove('loading');
                                        bubble.innerHTML = "";
                                    }

                                    aiTextAccumulator += partText;
                                    bubble.innerHTML = renderMarkdown(aiTextAccumulator);
                                    scrollToBottom();
                                }
                            } catch (e) {
                                // Chunk incompleto, se procesará en el siguiente ciclo
                            }
                        }
                    }
                }

                if (aiTextAccumulator) {
                    conversationHistory.push({ role: "model", parts: [{ text: aiTextAccumulator }] });
                }

            } catch (error) {
                console.error("Error al consultar:", error);
                typingIndicator.style.display = 'none';
                // Eliminar el último turno de usuario fallido del historial
                if (conversationHistory.length > 0 &&
                    conversationHistory[conversationHistory.length - 1].role === 'user') {
                    conversationHistory.pop();
                }
                appendMessage('ai', "Lo siento, ha ocurrido un error al procesar tu consulta. Por favor, revisa tu conexión e inténtalo de nuevo.");
            } finally {
                chatInput.disabled = false;
                sendBtn.disabled = false;
                chatInput.focus();
                scrollToBottom();
            }
        }

        // ─── Event Listeners ─────────────────────────────────────
        sendBtn.addEventListener('click', enviarMensaje);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enviarMensaje();
        });

        // ─── Service Worker (PWA) ────────────────────────────────
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(() => console.log('✅ Service Worker registrado'))
                    .catch(err => console.error('Error Service Worker:', err));
            });
        }

        // ─── Arranque ────────────────────────────────────────────
        window.onload = iniciarApp;
    </script>
</body>

</html>
